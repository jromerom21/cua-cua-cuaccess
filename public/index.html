<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cua Cua Cuaccess - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Inter:wght@400;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: { extend: {
            colors: { "primary": "#88171a", "secondary": "#fcd400", "surface": "#f8f9fb", "on-surface": "#191c1e" },
            fontFamily: { "headline": ["Inter", "sans-serif"], "youthful": ["Comfortaa", "cursive"] }
        }}
      }
    </script>
    <style>
      .brand-gradient { background: linear-gradient(135deg, #88171a 0%, #a01c20 100%); }
      .ambient-glow { pointer-events: none; position: absolute; border-radius: 50%; filter: blur(120px); z-index: 0; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-hidden">
    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b px-8 py-4 flex justify-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 flex items-center justify-center bg-primary text-white rounded">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">database</span>
            </div>
            <span class="text-xl font-black text-primary font-headline uppercase tracking-tighter">Cua Cua Cuaccess</span>
        </div>
    </header>

    <main class="min-h-screen pt-32 pb-20 px-6 relative flex flex-col items-center justify-center">
        <div class="ambient-glow top-[-10%] left-[-15%] w-[45rem] h-[45rem] bg-primary/15"></div>
        <div class="ambient-glow bottom-[-10%] right-[-15%] w-[50rem] h-[50rem] bg-secondary/20"></div>

        <section class="max-w-5xl w-full text-center z-10">
            <div class="mb-12 flex justify-center">
                <img alt="Logo" src="./logo.png" class="w-56 md:w-72 h-auto drop-shadow-2xl hover:scale-105 transition-transform duration-700"/>
            </div>
            <div class="space-y-6 mb-12">
                <h1 class="text-6xl md:text-8xl font-bold font-youthful tracking-tight text-on-surface">
                    Cua Cua <span class="text-primary">Cuaccess</span>
                </h1>
                <p class="text-xl md:text-2xl text-on-surface-variant font-medium">
                    Interfaz web moderna para tus datos de <span class="font-bold text-primary">Microsoft Access</span>.
                </p>
                <p class="text-xl md:text-2xl text-on-surface-variant font-medium">
                    Transformando archivos .accdb en una experiencia web segura y veloz.
                </p>
            </div>
            <div class="flex justify-center">
                <a href="querys.html" class="px-10 py-5 brand-gradient text-white rounded-xl font-bold text-xl shadow-2xl hover:-translate-y-1 transition-all">
                    Explorar Consultas →
                </a>
            </div>
        </section>
    </main>
</body>
</html>
